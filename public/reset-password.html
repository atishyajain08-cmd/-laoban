<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | Laoban Admin</title>
  <link rel="icon" type="image/png" href="assets/brand/laoban-lb-mark.png">
  <link rel="stylesheet" href="admin-styles.css?v=password-reset-1">
  <script defer src="assets/vendor/supabase.min.js"></script>
  <script defer src="supabase-config.js"></script>
  <script defer src="reset-password.js?v=password-reset-1"></script>
</head>
<body class="admin-page">
  <main class="admin-shell">
    <header class="admin-header">
      <a class="brand--logo" href="./"><img src="assets/brand/laoban-lb-mark.png" alt="Laoban"></a>
      <span>Secure password recovery</span>
    </header>

    <section class="admin-auth">
      <div>
        <p class="eyebrow">Laoban Admin</p>
        <h1>Reset password.</h1>
        <p>Create a new password for your Laoban backend account.</p>
      </div>

      <form class="admin-form" data-reset-form>
        <label>New password
          <input type="password" name="password" autocomplete="new-password" minlength="6" required>
        </label>
        <label>Confirm password
          <input type="password" name="confirmPassword" autocomplete="new-password" minlength="6" required>
        </label>
        <button class="button button--primary" type="submit">Update password</button>
        <p class="admin-message" data-reset-message aria-live="polite"></p>
      </form>

      <p class="admin-message" data-reset-ready aria-live="polite">Checking recovery link...</p>
    </section>
  </main>
</body>
</html>
